version: '3.8'
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      SAVE_SIGNING_SECRET: ${SAVE_SIGNING_SECRET:-dev-save-secret-12345678901234567890}
    restart: unless-stopped
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped