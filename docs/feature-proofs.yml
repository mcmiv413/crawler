features:
  - feature: ring-ability-casting
    name: Ring ability casting
    entry:
      files:
        - packages/game-contracts/src/commands/index.ts
        - packages/game-contracts/src/schemas/index.ts
        - packages/game-core/src/engine/command-handler.ts
    state:
      files:
        - packages/game-core/src/abilities/runtime/**
        - packages/game-core/src/abilities/effects/**
        - packages/game-core/src/engine/handlers/combat.ts
    event:
      files:
        - packages/game-contracts/src/events/index.ts
        - packages/presenter/src/event-formatter.ts
    presenter:
      files:
        - packages/presenter/src/game-view-builder.ts
        - packages/presenter/src/builders/**
    ui:
      files:
        - apps/web/src/components/**
    content:
      files:
        - packages/content/src/ring-spells/**
        - packages/content/src/abilities/**
    scenarioFixtures:
      - full-feature-e2e-test
    proofs:
      required:
        - scripts/check-ability-contracts.ts
        - tests/contracts/ability-contracts.contract.test.ts
        - tests/contracts/ability-runtime-coverage.contract.test.ts
        - tests/contracts/ring-magic.contract.test.ts
        - tests/e2e/full-game-features.spec.ts
      optional:
        - packages/game-core/src/engine/abilities-coverage.integration.test.ts
        - apps/web/src/components/DungeonPhase.test.tsx
    validation:
      focused:
        - pnpm run check:ability-contracts
        - pnpm vitest run tests/contracts/ability-contracts.contract.test.ts
        - pnpm test:e2e:scenario
      final:
        - pnpm validate

  - feature: combat-resolution
    name: Combat resolution
    entry:
      files:
        - packages/game-core/src/engine/command-handler.ts
        - packages/game-core/src/engine/handlers/combat.ts
    state:
      files:
        - packages/game-core/src/systems/combat.ts
        - packages/game-core/src/combat-preview.ts
    event:
      files:
        - packages/game-contracts/src/events/index.ts
        - packages/presenter/src/event-formatter.ts
    presenter:
      files:
        - packages/presenter/src/combat-indicators.ts
        - packages/presenter/src/game-view-builder.ts
    ui:
      files:
        - apps/web/src/components/DungeonPhase.tsx
        - apps/web/src/rendering/three/**
    scenarioFixtures:
      - enemy-death-test
      - full-feature-e2e-test
    proofs:
      required:
        - packages/game-core/src/systems/combat.test.ts
        - packages/game-core/src/engine/handlers/combat.test.ts
        - packages/presenter/src/event-formatter.test.ts
        - tests/e2e/combat-indicators.spec.ts
      optional:
        - packages/game-core/src/systems/combat.property.test.ts
        - packages/presenter/src/combat-indicators.test.ts
    validation:
      focused:
        - pnpm vitest run packages/game-core/src/systems/combat.test.ts
        - pnpm vitest run packages/presenter/src/event-formatter.test.ts
        - pnpm test:e2e:scenario
      final:
        - pnpm validate

