    proofs:
      required:
        - packages/game-core/src/systems/inventory.test.ts
        - packages/presenter/src/builders/inventory-view-builder.test.ts
        - apps/web/src/components/ShopPanel.test.tsx
        - tests/e2e/full-game-features.spec.ts
      optional:
