name: Critical Mutation Config Baseline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  mutation-critical:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check critical mutation config baseline
        run: pnpm test:mutation:critical
