name: Test Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache ESLint results
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-cache-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('eslint.config.mjs') }}
          restore-keys: |
            eslint-cache-${{ runner.os }}-${{ github.ref }}-
            eslint-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ESLint plugin
        run: NODE_OPTIONS="--max-old-space-size=2048" pnpm lint:prepare

      - name: Build all packages
        run: pnpm build

      - name: Check package exports
        run: node scripts/check-package-exports.mjs

      - name: Lint (with cache)
        run: NODE_OPTIONS="--max-old-space-size=2048" pnpm lint:eslint-cached

      - name: Type check
        run: NODE_OPTIONS="--max-old-space-size=2048" pnpm run lint:types

      - name: Run tests (excluding balance/heavy simulations)
        run: VITEST_MAX_THREADS=2 NODE_OPTIONS="--max-old-space-size=2048" pnpm test

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build server Docker image
        run: docker build -f Dockerfile.server -t rpg-server:test .

      - name: Build web Docker image
        run: docker build -f Dockerfile.web -t rpg-web:test .
