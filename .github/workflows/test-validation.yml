name: Test Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate repo skill mirrors
        run: pnpm skills:generate

      - name: Run repository validation gate
        run: pnpm validate

      - name: Run Playwright E2E grep-contract suite
        run: |
          pnpm run test:e2e:smoke
          pnpm run test:e2e:scenario
          pnpm run test:e2e:layout
          pnpm run test:e2e:renderer

      - name: Report structural hotspots
        run: pnpm run lint:structural:hotspots

      - name: Generate coverage report
        run: pnpm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: false

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build server Docker image
        run: docker build -f Dockerfile.server -t rpg-server:test .

      - name: Build web Docker image
        run: docker build -f Dockerfile.web -t rpg-web:test .
