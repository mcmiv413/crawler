name: Test Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate repo skill mirrors
        run: pnpm skills:generate

      - name: Run repository validation gate
        run: pnpm validate

      - name: Run browser smoke coverage
        run: pnpm test:e2e:smoke

      - name: Detect browser-facing changes
        id: browser_changes
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "$BASE_SHA" ] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="HEAD^"
          fi
          git diff --name-only "$BASE_SHA"...HEAD > /tmp/browser-facing-changes.txt
          if grep -E '^(apps/web/src/components/|apps/web/src/hooks/|apps/web/src/animation-runtime/|apps/web/src/rendering/|packages/presenter/src/|packages/game-contracts/src/events/|packages/game-contracts/src/commands/|packages/game-core/src/engine/command-handler\.ts|tests/e2e/support/|fixtures/scenarios/)' /tmp/browser-facing-changes.txt; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run browser scenario coverage
        if: steps.browser_changes.outputs.changed == 'true'
        run: pnpm test:e2e:scenario

      - name: Report structural hotspots
        run: pnpm run lint:structural:hotspots

      - name: Generate coverage report
        run: pnpm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: false

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build server Docker image
        run: docker build -f Dockerfile.server -t rpg-server:test .

      - name: Build web Docker image
        run: docker build -f Dockerfile.web -t rpg-web:test .
