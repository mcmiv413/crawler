name: Test Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: NODE_OPTIONS="--max-old-space-size=2048" pnpm run lint:types

      - name: Run unit tests (PR — changed files only)
        if: github.event_name == 'pull_request'
        run: >
          VITEST_MAX_THREADS=1 NODE_OPTIONS="--max-old-space-size=2048"
          pnpm test
          --exclude '**/*.property.test.ts'
          --exclude '**/*.balance.test.ts'
          --changed "origin/${{ github.base_ref }}"

      - name: Run unit tests (push — full suite)
        if: github.event_name == 'push'
        run: >
          VITEST_MAX_THREADS=1 NODE_OPTIONS="--max-old-space-size=2048"
          pnpm test
          --exclude '**/*.property.test.ts'
          --exclude '**/*.balance.test.ts'

      - name: Build all packages
        run: pnpm build

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build server Docker image
        run: docker build -f Dockerfile.server -t rpg-server:test .

      - name: Build web Docker image
        run: docker build -f Dockerfile.web -t rpg-web:test .
